business_rules:
  - id: BR01
    source_id: BR-JM-SCHEDULE-DATE
    name: Placement Date Must Not Be In The Past
    endpoint: /placement/api/placement/
    method: POST
    description: Placement schedules must be created only for current or future dates.
    scenarios:
      valid:
        _test_id: BR01_V_01
        _br_id: BR01
        _scenario: Valid
        _expected_result: Future-dated placement schedule is created successfully.
      invalid:
        _test_id: BR01_I_01
        _br_id: BR01
        _scenario: Invalid
        _expected_result: Past-dated placement schedule is rejected.

